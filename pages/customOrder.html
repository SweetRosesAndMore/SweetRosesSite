<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- EmailJS v4 -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
  const SERVICE_ID = "service_g8kr2tn";
  const TEMPLATE_ID = "template_o7a1ugr";
  const PUBLIC_KEY = "5b8-Ag4iRXl_7xsKu";

  emailjs.init({
    publicKey: PUBLIC_KEY,
  });

  const form = document.getElementById("orderForm");
  const toastArea = document.getElementById("toastArea");
  const submitButton = form.querySelector('button[type="submit"]');

  let isSending = false;

  function showToast(message, isSuccess = true) {
    const toast = document.createElement("div");

    toast.className =
      `toast align-items-center text-bg-${isSuccess ? "success" : "danger"} border-0`;

    toast.setAttribute("role", "alert");
    toast.setAttribute("aria-live", "assertive");
    toast.setAttribute("aria-atomic", "true");

    toast.innerHTML = `
      <div class="d-flex">
        <div class="toast-body"></div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          data-bs-dismiss="toast"
          aria-label="Close"
        ></button>
      </div>
    `;

    toast.querySelector(".toast-body").textContent = message;

    toastArea.appendChild(toast);

    const bsToast = bootstrap.Toast.getOrCreateInstance(toast, {
      delay: 5000,
    });

    bsToast.show();
    toast.addEventListener("hidden.bs.toast", () => toast.remove());
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    if (isSending) return;

    isSending = true;
    submitButton.disabled = true;
    submitButton.textContent = "Sending...";

    try {
      const response = await emailjs.sendForm(
        SERVICE_ID,
        TEMPLATE_ID,
        form
      );

      console.log("EmailJS success:", response.status, response.text);

      showToast("Thank you! We’ll get back to you shortly.", true);
      form.reset();
    } catch (error) {
      console.error("EmailJS error:", error);

      const errorMessage =
        error?.text ||
        error?.message ||
        "Something went wrong. Please try again.";

      showToast(`Email could not send as we are having troubles connecting. Please reach out to us directly!: ${errorMessage}`, false);
    } finally {
      isSending = false;
      submitButton.disabled = false;
      submitButton.textContent = "Send Request";
    }
  });
</script>
